name: Run CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: datasetai_ci
          POSTGRES_USER: datasetai_ci
          POSTGRES_PASSWORD: datasetai_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datasetai_ci -d datasetai_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      TIME_ZONE: UTC
      DB_NAME: datasetai_ci
      DB_USER: datasetai_ci
      DB_PASSWORD: datasetai_ci
      DB_HOST: 127.0.0.1
      DB_PORT: 5432

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/local.txt

      - name: Run Django system checks
        run: python manage.py check

      - name: Run test suite
        run: python manage.py test
