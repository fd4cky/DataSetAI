{% extends "ui/base.html" %}

{% block title %}DataSetAI | Вход{% endblock %}

{% block content %}
    <section class="auth-page">
        <div class="auth-card">
            <span class="eyebrow">Авторизация</span>
            <h1>Вход в аккаунт</h1>

            <form method="post" class="auth-form">
                {% csrf_token %}
                {% if form.non_field_errors %}
                    <div class="hidden" aria-hidden="true">
                        {% for error in form.non_field_errors %}
                            <div data-toast-message="{{ error }}" data-toast-type="error" data-toast-persistent="true"></div>
                        {% endfor %}
                    </div>
                {% endif %}
                <label class="field">
                    <span>{{ form.username.label }}</span>
                    {{ form.username }}
                </label>
                <label class="field">
                    <span>{{ form.password.label }}</span>
                    {{ form.password }}
                </label>
                <button class="btn btn--primary" type="submit">Войти</button>
            </form>
        </div>
    </section>
{% endblock %}
